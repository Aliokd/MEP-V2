name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Firebase Hosting (CLI)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEP_V2 }}' > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/service-account.json"
          npx firebase deploy --only hosting --non-interactive
